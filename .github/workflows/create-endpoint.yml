name: create-endpoint

on:
  workflow_call:
    inputs:
      endpoint_file:
        required: true
        type: string
      resource_group:
        required: true
        type: string
      workspace_name:
        required: true
        type: string
      endpoint_name:
        required: true
        type: string
      endpoint_type:
        required: true
        type: string
    secrets:
      creds:
        required: true

jobs:
  create-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: "Az CLI login (Service Principal)"
        uses: azure/login@v1
        with:
          creds: ${{ secrets.creds }}
          enable-AzPSSession: true

      - name: install-extension
        run: az extension add -n ml -y

      - name: update-extension
        run: az extension update -n ml

      - name: register-providers
        run: |
          az provider register --namespace Microsoft.MachineLearningServices --wait
          az provider register --namespace Microsoft.ContainerRegistry --wait
          az provider register --namespace Microsoft.ContainerInstance --wait

      - name: create-environment-from-file
        run: |
          if az ml ${{ inputs.endpoint_type }}-endpoint show \
            --name ${{ inputs.endpoint_name }} \
            --resource-group ${{ inputs.resource_group }} \
            --workspace-name ${{ inputs.workspace_name }} > /dev/null 2>&1; then
            echo "Endpoint already exists, updating..."
            az ml ${{ inputs.endpoint_type }}-endpoint update \
              --name ${{ inputs.endpoint_name }} \
              -f ${{ github.workspace }}/${{ inputs.endpoint_file }} \
              --resource-group ${{ inputs.resource_group }} \
              --workspace-name ${{ inputs.workspace_name }}
          else
            echo "Creating new endpoint..."
            az ml ${{ inputs.endpoint_type }}-endpoint create \
              --name ${{ inputs.endpoint_name }} \
              -f ${{ github.workspace }}/${{ inputs.endpoint_file }} \
              --resource-group ${{ inputs.resource_group }} \
              --workspace-name ${{ inputs.workspace_name }}
          fi
